---
name: Deploy landing page

# 랜딩 페이지(landing/)를 GitHub Pages로 배포한다.
# 첫 실행 시 configure-pages 가 Pages 를 자동 활성화(enablement: true)한다.

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

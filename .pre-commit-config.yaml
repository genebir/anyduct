---
# pre-commit hooks (SPEC.md §8.4)
# 설치: uv run pre-commit install
# 전체 실행: uv run pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          # Mirror the project's core dependencies so mypy can resolve
          # imports inside the hook's isolated venv. Keep in sync with
          # [project.dependencies] in pyproject.toml — extras (boto3,
          # hvac, google-cloud-secret-manager, etc.) are already
          # silenced via [[tool.mypy.overrides]].
          - pydantic>=2.7
          - pyyaml>=6.0
          - types-PyYAML>=6.0
          - structlog>=24.1
          - typer>=0.12
          - tenacity>=8.2
          - jinja2>=3.1
          - python-dotenv>=1.0
        args: [--config-file=pyproject.toml]
        files: ^etl_plugins/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^\.env\.example$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

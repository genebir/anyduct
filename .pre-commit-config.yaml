---
# pre-commit hooks (SPEC.md §8.4)
# 설치: uv run pre-commit install
# 전체 실행: uv run pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        # mkdocs-material uses !!python/name: tags (e.g. for the Mermaid
        # superfences fence formatter) that check-yaml's safe loader
        # cannot construct. The example connections file uses the custom
        # ``!secret`` tag (ADR-0024) for the same reason. yamllint still
        # lints both files' structure.
        exclude: ^(mkdocs\.yml|examples/connections\.example\.yaml|services/charts/.*/templates/.*)$
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
        # Self-hosted variable web fonts are intentionally committed (no CDN
        # at runtime); a full-Hangul woff2 is ~2MB and cannot be subset.
        exclude: ^services/etlx-web/public/fonts/
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          # Mirror the project's core dependencies so mypy can resolve
          # imports inside the hook's isolated venv. Keep in sync with
          # [project.dependencies] in pyproject.toml — extras (boto3,
          # hvac, google-cloud-secret-manager, etc.) are already
          # silenced via [[tool.mypy.overrides]].
          - pydantic>=2.7
          - pyyaml>=6.0
          - types-PyYAML>=6.0
          - structlog>=24.1
          - typer>=0.12
          - tenacity>=8.2
          - jinja2>=3.1
          - python-dotenv>=1.0
          - httpx>=0.27
        args: [--config-file=pyproject.toml]
        files: ^etl_plugins/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^\.env\.example$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

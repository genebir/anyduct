---
# 로컬 개발/통합 테스트용 인프라 (SPEC.md §8.1)
# 사용:
#   make up         # 기동
#   make down       # 중지
#   make logs       # 로그 tailing
#
# 호스트 포트:
#   postgres : 5432
#   kafka    : 9092
#   minio    : 9000 (S3 API) / 9001 (콘솔)
#   redis    : 6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: etl-postgres
    environment:
      POSTGRES_USER: ${LOCAL_PG_USER:-etl}
      POSTGRES_PASSWORD: ${LOCAL_PG_PASSWORD:-etl}
      POSTGRES_DB: ${LOCAL_PG_DB:-etl_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_PG_USER:-etl}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: etl-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (Zookeeper 불필요)
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: etl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LOCAL_MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LOCAL_MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: etl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  kafka_data:
  minio_data:
  redis_data:

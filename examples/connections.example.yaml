# Companion connections file for examples/cross_db_migration.yaml.
#
# Secrets live behind ``!secret`` markers — provide them via the secret
# backend you configured (Vault / AWS SM / GCP SM / file). NEVER commit
# real credentials. See ADR-0024.
connections:
  - name: pg_oltp
    type: postgres
    config:
      host: localhost
      port: 5432
      database: oltp
      user: app_reader
      password: !secret pg_oltp.password
  - name: sqlite_analytics
    type: sqlite
    config:
      database: /tmp/analytics.db
  # Cloud DW connectors (Phases AGE→AGH) — companions for
  # examples/cross_cloud_dw_migration.yaml. Install the matching extra
  # ([snowflake] / [bigquery]) before a live run.
  - name: snowflake_dw
    type: snowflake
    config:
      account: xy12345.eu-west-1
      user: etl_loader
      password: !secret snowflake_dw.password
      warehouse: LOAD_WH
      database: ANALYTICS
      schema: PUBLIC
  - name: bigquery_dw
    type: bigquery
    config:
      project: my-gcp-project
      dataset: analytics
      credentials_json: !secret bigquery_dw.credentials_json
  # Streaming connectors (Phases AGM/AGN) — companions for
  # examples/stream_queue_to_stream.yaml. Install [sqs] / [redis].
  - name: sqs_jobs
    type: sqs
    config:
      region: us-east-1
      aws_access_key_id: !secret sqs_jobs.access_key
      aws_secret_access_key: !secret sqs_jobs.secret_key
  - name: redis_events
    type: redis
    config:
      host: localhost
      port: 6379
      db: 0
      password: !secret redis_events.password

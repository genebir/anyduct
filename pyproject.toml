[project]
name = "etl-plugins"
dynamic = ["version"]
description = "Backend-agnostic, orchestrator-agnostic Python ETL plugin library."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "duarl", email = "duarltmd@gmail.com" }]
keywords = ["etl", "data-pipeline", "connectors", "plugins"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "structlog>=24.1",
    "typer>=0.12",
    "tenacity>=8.2",
    "jinja2>=3.1",
    "python-dotenv>=1.0",
]

# 커넥터별 드라이버는 extras로 분리 (Step 2 이후 채움)
[project.optional-dependencies]
postgres = []   # ["psycopg[binary]>=3.1"] — Step 2.1에서 추가
s3 = []         # ["boto3>=1.34", "pyarrow>=16.0"] — Step 2.2
kafka = []      # ["confluent-kafka>=2.4"] — Step 2.3
observability = []  # ["opentelemetry-sdk>=1.25", "opentelemetry-exporter-otlp>=1.25"] — Step 1.6

# CLI entry point (Step 3에서 구현)
[project.scripts]
etlx = "etl_plugins.cli:app"

# 외부 커넥터 자동 발견용 entry point 그룹
# 외부 패키지에서:
#   [project.entry-points."etl_plugins.connectors"]
#   <name> = "<module>:<Class>"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "etl_plugins/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["etl_plugins"]

# === uv (PEP 735 dependency-groups) ===
[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=3.8",
    "detect-secrets>=1.5",
    "yamllint>=1.35",
    "testcontainers>=4.7",
    "types-PyYAML>=6.0",
]

# === ruff: lint + format ===
[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["docker/", "configs/"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line length — formatter가 처리
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["N802", "N803"]  # 테스트 함수명은 자유롭게

# === mypy: strict typing ===
[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# === pytest ===
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "it: integration tests (require docker / testcontainers)",
    "slow: marks tests as slow",
]
asyncio_mode = "auto"

# === coverage ===
[tool.coverage.run]
source = ["etl_plugins"]
omit = ["tests/*", "*/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

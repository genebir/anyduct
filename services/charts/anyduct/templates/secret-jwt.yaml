{{- if not .Values.jwt.existingSecret }}
{{- if or (not .Values.jwt.privateKeyPem) (not .Values.jwt.publicKeyPem) }}
{{- fail "jwt.privateKeyPem/publicKeyPem are required when jwt.existingSecret is unset (generate with `anyduct admin gen-jwt-keys`)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "anyduct.fullname" . }}-jwt
  labels: {{- include "anyduct.labels" . | nindent 4 }}
type: Opaque
stringData:
  private.pem: {{ .Values.jwt.privateKeyPem | quote }}
  public.pem: {{ .Values.jwt.publicKeyPem | quote }}
{{- end }}

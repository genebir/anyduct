# One-shot Alembic upgrade — the k8s twin of compose's etlx-migrate.
# post-install: the DB StatefulSet exists by then; the job retries until
# Postgres answers. pre-upgrade: schema moves before new pods roll.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "etlx.fullname" . }}-migrate
  labels: {{- include "etlx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etlx-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          command: ["etlx-server", "db", "upgrade", "head"]
          env: {{- include "etlx.serverEnv" . | nindent 12 }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "etlx.fullname" . }}-server
  labels: {{- include "etlx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: {{ .Values.server.port }}
  selector:
    app.kubernetes.io/name: etlx-server
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etlx.fullname" . }}-server
  labels: {{- include "etlx.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: etlx-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etlx-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: server
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          ports:
            - containerPort: {{ .Values.server.port }}
          env: {{- include "etlx.serverEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.server.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.server.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}

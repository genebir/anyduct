{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "etlx.fullname" . }}-web
  labels: {{- include "etlx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.port }}
  selector:
    app.kubernetes.io/name: etlx-web
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etlx.fullname" . }}-web
  labels: {{- include "etlx.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: etlx-web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etlx-web
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: web
          # NEXT_PUBLIC_API_URL is inlined at IMAGE BUILD time (see
          # docs/deployment.md) — point the build at the server's public
          # URL; runtime env cannot override it.
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          {{- with .Values.web.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}

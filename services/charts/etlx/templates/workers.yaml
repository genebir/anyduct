{{/* The four queue processes share the server image and env; only the
     command and replica posture differ. Workers expose no HTTP, so no
     probes (mirrors compose disabling the image healthcheck). The batch
     worker scales for throughput; the rest are SKIP LOCKED-safe but one
     replica is plenty (HA only). */}}
{{- $root := . }}
{{- range $proc := list
      (dict "name" "worker"        "replicas" $root.Values.worker.replicas        "resources" $root.Values.worker.resources        "command" (list "etlx-server" "worker" "run" "--log-flush-interval" ($root.Values.worker.logFlushInterval | toString)))
      (dict "name" "scheduler"     "replicas" $root.Values.scheduler.replicas     "resources" $root.Values.scheduler.resources     "command" (list "etlx-server" "scheduler" "run"))
      (dict "name" "reaper"        "replicas" $root.Values.reaper.replicas        "resources" $root.Values.reaper.resources        "command" (list "etlx-server" "reaper" "run"))
      (dict "name" "stream-worker" "replicas" $root.Values.streamWorker.replicas "resources" $root.Values.streamWorker.resources "command" (list "etlx-server" "stream-worker" "run"))
}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etlx.fullname" $root }}-{{ $proc.name }}
  labels: {{- include "etlx.labels" $root | nindent 4 }}
spec:
  replicas: {{ $proc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: etlx-{{ $proc.name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etlx-{{ $proc.name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
    spec:
      containers:
        - name: {{ $proc.name }}
          image: "{{ $root.Values.image.server.repository }}:{{ $root.Values.image.server.tag }}"
          imagePullPolicy: {{ $root.Values.image.server.pullPolicy }}
          command: {{- toYaml $proc.command | nindent 12 }}
          env: {{- include "etlx.serverEnv" $root | nindent 12 }}
          {{- with $proc.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}

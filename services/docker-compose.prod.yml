# services/docker-compose.prod.yml — production-shaped local stack.
#
# Use this to validate a build before shipping it; for actual production
# the same images go through Helm (Step 11) but the topology here mirrors
# what k8s will run: db + one-shot migrate + server + worker + scheduler
# + reaper + web.
#
# Bring up:
#
#     # 1) generate JWT keypair if you haven't already
#     etlx admin gen-jwt-keys --out-dir .run
#     # 2) export keys + DB url for compose's env interpolation
#     export AUTH_JWT_PRIVATE_KEY_PEM="$(cat .run/jwt_private.pem)"
#     export AUTH_JWT_PUBLIC_KEY_PEM="$(cat .run/jwt_public.pem)"
#     # 3) build + start (etlx-migrate runs once, others wait for it)
#     docker compose -f services/docker-compose.prod.yml up -d --build
#     # 4) seed the first admin user
#     docker compose -f services/docker-compose.prod.yml exec etlx-server \
#         etlx-server admin create-user --email you@example.com --name You \
#                                       --superadmin
#
# Stop: `docker compose -f services/docker-compose.prod.yml down`
# Reset volumes: append `-v` (drops metadata DB).
#
# The build context is `..` (the repo root) for both images — the uv
# workspace + pnpm workspace need files outside `services/`.

x-server-env: &server-env
  DATABASE_URL: postgresql+asyncpg://etlx:etlx@metadata-db:5432/etlx
  AUTH_JWT_PRIVATE_KEY_PEM: ${AUTH_JWT_PRIVATE_KEY_PEM:?must export AUTH_JWT_PRIVATE_KEY_PEM (see top of file)}
  AUTH_JWT_PUBLIC_KEY_PEM: ${AUTH_JWT_PUBLIC_KEY_PEM:?must export AUTH_JWT_PUBLIC_KEY_PEM}
  AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-etlx-server}
  AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-etlx}
  # Pydantic-settings v2 parses list[str] env vars as JSON. Wrap the value
  # in JSON brackets — a comma-separated list would raise SettingsError.
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
  SECRET_BACKEND: ${SECRET_BACKEND:-env}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  SERVICE_NAME: etlx-server

x-server-build: &server-build
  build:
    context: ..
    dockerfile: services/etlx-server/Dockerfile
  image: etlx-server:prod

services:
  # Default: vanilla postgres. `etlx-migrate` will apply the schema on
  # first boot. Swap by setting `ETLX_DB_IMAGE=etlx-postgres:dev` (or
  # `:demo` for sample data) — that image ships with the schema already
  # baked in via /docker-entrypoint-initdb.d, so migrate is a no-op on
  # a fresh volume.
  metadata-db:
    image: ${ETLX_DB_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: etlx
      POSTGRES_PASSWORD: etlx        # pragma: allowlist secret
      POSTGRES_DB: etlx
    volumes:
      - metadata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlx -d etlx"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot job: applies pending Alembic revisions, then exits 0. Other
  # services use `depends_on: { etlx-migrate: { condition: service_completed_successfully } }`
  # so they don't race the schema. k8s equivalent: an init-container.
  etlx-migrate:
    <<: *server-build
    depends_on:
      metadata-db:
        condition: service_healthy
    environment: *server-env
    command: ["etlx-server", "db", "upgrade", "head"]
    restart: "no"

  etlx-server:
    <<: *server-build
    depends_on:
      etlx-migrate:
        condition: service_completed_successfully
    environment: *server-env
    ports:
      - "${ETLX_SERVER_PORT:-8000}:8000"
    restart: unless-stopped

  etlx-worker:
    <<: *server-build
    depends_on:
      etlx-migrate:
        condition: service_completed_successfully
    environment: *server-env
    command: ["etlx-server", "worker", "run", "--log-flush-interval", "2.0"]
    healthcheck:
      # Workers don't expose HTTP — disable the image's /ready probe.
      disable: true
    restart: unless-stopped

  etlx-scheduler:
    <<: *server-build
    depends_on:
      etlx-migrate:
        condition: service_completed_successfully
    environment: *server-env
    command: ["etlx-server", "scheduler", "run"]
    healthcheck:
      disable: true
    restart: unless-stopped

  etlx-reaper:
    <<: *server-build
    depends_on:
      etlx-migrate:
        condition: service_completed_successfully
    environment: *server-env
    command: ["etlx-server", "reaper", "run"]
    healthcheck:
      disable: true
    restart: unless-stopped

  etlx-stream-worker:
    <<: *server-build
    depends_on:
      etlx-migrate:
        condition: service_completed_successfully
    environment: *server-env
    command: ["etlx-server", "stream-worker", "run"]
    healthcheck:
      disable: true
    restart: unless-stopped
    profiles: ["stream"]   # opt-in: only start when explicitly enabled

  etlx-web:
    build:
      context: ..
      dockerfile: services/etlx-web/Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined at build time. The default points at the
        # etlx-server published port on the docker host (compose's internal
        # DNS isn't reachable from the user's browser).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: etlx-web:prod
    depends_on:
      etlx-server:
        condition: service_healthy
    ports:
      - "${ETLX_WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  metadata_pgdata:
